<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Agent Wallet Auto-Presenter</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #000000;
            --bg-card: #111111;
            --green-bright: #00ff00;
            --amber: #ffaa00;
            --cyan: #00f0ff;
            --blue: #0033ff;
            --red-bright: #ff0033;
            --purple: #ff00ff;
            --text-primary: #ffffff;
            --text-muted: #555555;
            --border: #333333;
            --font-display: 'Press Start 2P', cursive;
            --font-body: 'VT323', monospace;
            --shadow-dist: 6px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            background-image: radial-gradient(var(--border) 2px, transparent 2px);
            background-size: 20px 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        iframe.active {
            opacity: 1;
            z-index: 10;
        }

        #overlay {
            position: absolute;
            z-index: 100;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #overlay-content {
            max-width: 800px;
            padding: 40px;
            background: var(--bg-card);
            border: 4px solid var(--text-primary);
            box-shadow: var(--shadow-dist) var(--shadow-dist) 0px 0px var(--border);
        }

        h1 {
            color: var(--cyan);
            margin-top: 0;
            font-family: var(--font-display);
            font-size: 24px;
            text-shadow: 4px 4px 0px var(--blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-secondary);
            font-size: 24px;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 16px;
            cursor: pointer;
            color: var(--bg-void);
            background: var(--green-bright);
            border: 4px solid var(--text-primary);
            font-family: var(--font-display);
            text-transform: uppercase;
            box-shadow: 6px 6px 0px var(--purple);
            transition: all 0.1s;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--cyan);
        }

        #captions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid var(--text-primary);
            color: var(--text-primary);
            padding: 20px 40px;
            font-size: 32px;
            text-align: center;
            max-width: 80%;
            line-height: 1.2;
            box-shadow: 8px 8px 0px var(--purple);
            opacity: 0;
            transition: opacity 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            font-family: var(--font-body);
        }

        #captions.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <!-- Iframes for our views -->
    <iframe id="dash" src="vercel-deploy/index.html"></iframe>
    <iframe id="deck" src="presentation.html"></iframe>

    <!-- Captions -->
    <div id="captions"></div>

    <!-- Start Overlay -->
    <div id="overlay">
        <div id="overlay-content">
            <h1>🎬 Automated Video Presenter</h1>
            <p>I will automatically drive the presentation, switch between the dashboard and slides, and read the
                voiceover script out loud.</p>
            <p style="color: #fff; font-weight: bold;">
                1. Make sure your system volume is up.<br>
                2. Start your screen recorder (Win + Alt + R).<br>
                3. Click Play.
            </p>
            <button class="btn" onclick="start()">▶ Start Presentation</button>
        </div>
    </div>

    <script>
        const script = [
            // ── HOOK ──
            {
                view: 'dash',
                text: "What if your AI agents could manage real money — autonomously — without you ever handing them a private key?"
            },
            {
                view: 'dash',
                text: "That's Agent Wallet Runtime. What you're seeing right now is three autonomous agents — Orion, Lyra, and Vega — executing real blockchain transactions on Solana devnet, in real time, right now."
            },
            // ── THE PROBLEM ──
            {
                view: 'dash',
                text: "Here's the problem every AI-crypto builder hits: you give your agent a private key. It's sitting in a .env file. One leak, one prompt injection, one compromised dependency — your wallet is gone. That's not infrastructure. That's a loaded gun left on the table."
            },
            // ── OUR SOLUTION ──
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-idea",
                text: "We solved this with a trust boundary. Agents never hold keys. Instead, they emit structured intents: things like 'transfer 0.008 SOL to this address' or 'swap my SOL for USDC on Jupiter.' Just a declaration of intent."
            },
            {
                view: 'deck',
                text: "The Wallet Runtime intercepts every intent before anything gets signed. It runs a policy check — is this within the agent's daily spend limit? Is this program whitelisted? Then it runs a full on-chain simulation. The transaction is executed in a dry run against Solana's RPC before a single byte is signed. Only then does it sign and broadcast."
            },
            {
                view: 'deck',
                text: "An agent literally cannot spend more than its policy allows. It's not a guideline. It's enforced in the layer between agent logic and the blockchain. No bypass. No override."
            },
            // ── LIVE PROOF ──
            {
                view: 'dash',
                text: "Look at the transaction feed. You can see green checkmarks — those are confirmed on-chain transactions. And you can see red rejections — those are the policy engine doing its job in real time, blocking ORION from exceeding its daily spending limit."
            },
            {
                view: 'dash',
                text: "Orion is in 'cold' regime right now — it hit its daily cap. LYRA is in 'stable' mode, accumulating. Vega is 'active', rebalancing across agents. These aren't hardcoded states. Each agent reads its own historical performance from a SQLite audit trail and adapts its strategy every cycle."
            },
            // ── JUPITER DEX ──
            {
                view: 'dash',
                text: "We also integrated the Jupiter v6 DEX aggregator. Lyra swaps 0.01 SOL for USDC every 5th cycle. Jupiter finds the best route across Raydium, Orca, and Meteora. The swap comes back as a Versioned Transaction — we handle that correctly alongside legacy transactions, full simulation gate included."
            },
            // ── TECHNICAL CREDIBILITY ──
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-numbers",
                text: "Here are the hard numbers. 29 tests passing. Zero build errors. AES-256-GCM encrypted keystore with PBKDF2 key derivation. BIP44 HD wallet derivation — one master mnemonic, infinite deterministic agent wallets. Strict TypeScript throughout. Every transaction logged to SQLite with full intent, result, balance delta, and simulation logs."
            },
            // ── STRONG CLOSE ──
            {
                view: 'dash',
                text: "The architecture is ready to plug in a real reasoning model. Swap out the if-else agent logic for an LLM call, and you have an AI agent that can genuinely reason about its financial decisions — with a system underneath it that you can actually trust with real capital."
            },
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-title",
                text: "Agent Wallet Runtime. The secure execution layer that autonomous AI agents on Solana deserve. Thank you."
            }
        ];

        let currentIdx = 0;

        function showView(id) {
            document.querySelectorAll('iframe').forEach(el => el.classList.remove('active'));
            if (id) document.getElementById(id).classList.add('active');
        }

        function speakNext() {
            if (currentIdx >= script.length) {
                document.getElementById('captions').classList.remove('visible');
                return; // Presentation finished
            }

            const step = script[currentIdx];

            // Handle view switching
            if (step.view) showView(step.view);
            if (step.action) step.action();

            // Handle captions
            const captions = document.getElementById('captions');
            captions.innerText = step.text;
            captions.classList.add('visible');

            // Handle speech
            const u = new SpeechSynthesisUtterance(step.text);
            u.rate = 1.0;
            u.pitch = 1.0;

            // Try to find a good natural English voice
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                v.name.includes('Microsoft Mark') || // good windows voice
                v.name.includes('Google US English') ||
                (v.lang.startsWith('en') && v.name.includes('Natural'))
            );
            if (preferred) u.voice = preferred;

            u.onend = () => {
                currentIdx++;
                captions.classList.remove('visible');
                setTimeout(speakNext, 800); // 0.8s pause between sentences
            };

            // Safety fallback if speech API fails
            u.onerror = () => {
                setTimeout(() => {
                    currentIdx++;
                    speakNext();
                }, 4000);
            };

            window.speechSynthesis.speak(u);
        }

        function start() {
            // Must initialize voices on user interaction
            window.speechSynthesis.getVoices();

            // Hide overlay
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';

                // Start presentation
                setTimeout(speakNext, 1000);
            }, 500);
        }
    </script>
</body>

</html>
