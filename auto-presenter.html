<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Agent Wallet Auto-Presenter</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        iframe.active {
            opacity: 1;
            z-index: 10;
        }

        #overlay {
            position: absolute;
            z-index: 100;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 6, 10, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        #overlay-content {
            max-width: 600px;
            padding: 40px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 16px;
            background: #0c0c14;
        }

        h1 {
            color: #00ff88;
            margin-top: 0;
            font-family: monospace;
        }

        p {
            color: #8888a0;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 20px;
            cursor: pointer;
            background: #00ff88;
            color: #06060a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.2s;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        #captions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(0, 0, 0, 0.85);
            color: #e8e8f0;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 26px;
            text-align: center;
            max-width: 80%;
            line-height: 1.4;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #captions.visible {
            opacity: 1;
        }
    </style>
</head>

<body>
    <!-- Iframes for our views -->
    <iframe id="dash" src="vercel-deploy/index.html"></iframe>
    <iframe id="deck" src="presentation.html"></iframe>

    <!-- Captions -->
    <div id="captions"></div>

    <!-- Start Overlay -->
    <div id="overlay">
        <div id="overlay-content">
            <h1>🎬 Automated Video Presenter</h1>
            <p>I will automatically drive the presentation, switch between the dashboard and slides, and read the
                voiceover script out loud.</p>
            <p style="color: #fff; font-weight: bold;">
                1. Make sure your system volume is up.<br>
                2. Start your screen recorder (Win + Alt + R).<br>
                3. Click Play.
            </p>
            <button class="btn" onclick="start()">▶ Start Presentation</button>
        </div>
    </div>

    <script>
        const script = [
            {
                view: 'dash',
                text: "Hey everyone, this is Agent Wallet Runtime — an autonomous AI wallet infrastructure built for Solana."
            },
            {
                view: 'dash',
                text: "What you're looking at right now is our live devnet dashboard. We have three autonomous agents—Alpha, Beta, and Gamma—actively making financial decisions and executing transactions on-chain."
            },
            {
                view: 'dash',
                text: "The core problem we're solving is security. Right now, most AI agents hold a plaintext private key in a Python script. If the script gets hacked, the wallet is drained. We built a system where agents never touch the private key."
            },
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-idea",
                text: "Instead of signing transactions directly, our agents emit intents — structured requests like 'transfer 0.1 SOL' or 'swap SOL for USDC on Jupiter'."
            },
            {
                view: 'deck',
                text: "These intents are intercepted by our Wallet Runtime. Before any signature happens, the runtime enforces strict security policies, like per-transaction limits and daily spend caps. Then it fully simulates the transaction."
            },
            {
                view: 'deck',
                text: "Only if the policy passes AND the simulation succeeds does the runtime finally sign and broadcast to the blockchain."
            },
            {
                view: 'dash',
                text: "Back on the dashboard, you can see our agents operating in different regimes based on their historical success rates."
            },
            {
                view: 'dash',
                text: "Alpha is a Momentum Market Maker. Beta is a Smart Accumulator that integrates directly with the Jupiter v6 API to swap excess SOL for USDC. Gamma acts as a Rebalancer."
            },
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-works",
                text: "We wanted to build proof, not promises. The system features a strict TypeScript codebase with zero build errors."
            },
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-numbers",
                text: "We have 29 out of 29 unit tests passing, deterministic HD wallet derivation using BIP44, and an AES-256-GCM encrypted keystore."
            },
            {
                view: 'deck',
                action: () => document.getElementById('deck').src = "presentation.html#slide-title",
                text: "The entire codebase is open source and strictly typed. You can pull it down and run the simulation CLI yourself in under 2 minutes."
            },
            {
                view: 'deck',
                text: "Thanks for checking out Agent Wallet Runtime — making autonomous AI agents secure enough for real capital."
            }
        ];

        let currentIdx = 0;

        function showView(id) {
            document.querySelectorAll('iframe').forEach(el => el.classList.remove('active'));
            if (id) document.getElementById(id).classList.add('active');
        }

        function speakNext() {
            if (currentIdx >= script.length) {
                document.getElementById('captions').classList.remove('visible');
                return; // Presentation finished
            }

            const step = script[currentIdx];

            // Handle view switching
            if (step.view) showView(step.view);
            if (step.action) step.action();

            // Handle captions
            const captions = document.getElementById('captions');
            captions.innerText = step.text;
            captions.classList.add('visible');

            // Handle speech
            const u = new SpeechSynthesisUtterance(step.text);
            u.rate = 1.0;
            u.pitch = 1.0;

            // Try to find a good natural English voice
            const voices = window.speechSynthesis.getVoices();
            const preferred = voices.find(v =>
                v.name.includes('Microsoft Mark') || // good windows voice
                v.name.includes('Google US English') ||
                (v.lang.startsWith('en') && v.name.includes('Natural'))
            );
            if (preferred) u.voice = preferred;

            u.onend = () => {
                currentIdx++;
                captions.classList.remove('visible');
                setTimeout(speakNext, 800); // 0.8s pause between sentences
            };

            // Safety fallback if speech API fails
            u.onerror = () => {
                setTimeout(() => {
                    currentIdx++;
                    speakNext();
                }, 4000);
            };

            window.speechSynthesis.speak(u);
        }

        function start() {
            // Must initialize voices on user interaction
            window.speechSynthesis.getVoices();

            // Hide overlay
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';

                // Start presentation
                setTimeout(speakNext, 1000);
            }, 500);
        }
    </script>
</body>

</html>
